<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛡️ ARZAMA POLICE INTELLIGENCE SYSTEM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
    
    :root {
      --primary-cyan: #00f5ff;
      --alert-red: #ff1744;
      --secondary-violet: #8b5cf6;
      --bg-dark: #0a0a0a;
      --panel-dark: #1a1a2e;
      --glass-bg: rgba(255,255,255,0.05);
      --glow-cyan: 0 0 20px #00f5ff;
      --glow-red: 0 0 30px #ff1744;
    }
    
    body {
      font-family: 'Rajdhani', sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #16213e 50%, var(--bg-dark) 100%);
      color: #e2e8f0;
      overflow-x: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(90deg, transparent 49%, rgba(0,245,255,0.03) 50%, transparent 51%);
      background-size: 50px 50px;
      animation: scan 20s linear infinite;
      z-index: -1;
    }
    
    @keyframes scan { 0% { transform: translateY(-50px); } 100% { transform: translateY(100vh); } }
    
    .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .glow-cyan { box-shadow: var(--glow-cyan); }
    .glow-cyan:hover { box-shadow: 0 0 40px #00f5ff; }
    .glow-red { box-shadow: var(--glow-red); animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { box-shadow: var(--glow-red); } 50% { box-shadow: 0 0 50px #ff1744; } }
    
    .neon-text { background: linear-gradient(45deg, var(--primary-cyan), var(--secondary-violet)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-family: 'Orbitron', monospace; font-weight: 700; text-shadow: 0 0 10px rgba(0,245,255,0.5); }
    

.btn-danger { background: linear-gradient(to right, #ef4444, #dc2626); color: white; font-weight: bold; padding: 0.75rem 1.5rem; border-radius: 0.5rem; transition: all 0.3s; text-transform: uppercase; letter-spacing: 0.05em; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
.btn-danger:hover { background: linear-gradient(to right, #dc2626, #b91c1c); }
    
.status-wanted { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5); color: #fda4af; font-weight: bold; padding: 0.25rem 0.75rem; border-radius: 9999px; box-shadow: var(--glow-red); }
.status-arrested { background: rgba(34,197,94,0.2); border: 1px solid rgba(34,197,94,0.5); color: #86efac; font-weight: bold; padding: 0.25rem 0.75rem; border-radius: 9999px; }
.status-surveillance { background: rgba(234,179,8,0.2); border: 1px solid rgba(234,179,8,0.5); color: #fde68a; font-weight: bold; padding: 0.25rem 0.75rem; border-radius: 9999px; }
    
    .typing { overflow: hidden; border-right: .15em solid var(--primary-cyan); white-space: nowrap; animation: typing 3s steps(40, end), blink .75s step-end infinite; }
    @keyframes typing { from { width: 0 } to { width: 100% } }
    @keyframes blink { from, to { border-color: transparent } 50% { border-color: var(--primary-cyan); } }
    
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
  </style>
</head>
<body>
  <div id="app"></div>
  
  <script>
    // EMBEDDED DEMO DATA - NO FETCH NEEDED
    const DEMO_DATA = {
      users: [
        {id:1, name:"Inspector Arjun Rao", email:"arjun@arzama.police", password:"admin123", role:"admin"},
        {id:2, name:"Officer Neha Singh", email:"neha@arzama.police", password:"officer123", role:"officer"},
        {id:3, name:"Cyber Unit K-9", email:"k9@arzama.police", password:"cyber456", role:"officer"}
      ],
      citizens: [
        {id:1, name:"Rahul Sharma", dob:"1985-03-15", address:"23 MG Road", id_proof:"ID-ARS-001234", photo_url:"https://randomuser.me/api/portraits/men/1.jpg"},
        {id:2, name:"Priya Patel", dob:"1990-07-22", address:"45 Nehru Nagar", id_proof:"ID-ARS-005678", photo_url:"https://randomuser.me/api/portraits/women/2.jpg"},
        {id:3, name:"Vikram Desai", dob:"1978-11-08", address:"12 Industrial Area", id_proof:"ID-ARS-009876", photo_url:"https://randomuser.me/api/portraits/men/3.jpg"},
        {id:4, name:"Aisha Khan", dob:"1995-04-30", address:"67 Hill View", id_proof:"ID-ARS-112233", photo_url:"https://randomuser.me/api/portraits/women/4.jpg"},
        {id:5, name:"Unknown Subject X", dob:"????", address:"Classified", id_proof:"ID-ARS-XXXXX", photo_url:"https://i.pravatar.cc/300?img=5"},
        {id:6, name:"Sanjay Gupta", dob:"1982-09-12", address:"89 Market Street", id_proof:"ID-ARS-445566", photo_url:"https://randomuser.me/api/portraits/men/6.jpg"},
        {id:7, name:"Meera Joshi", dob:"1992-01-18", address:"34 Park Lane", id_proof:"ID-ARS-778899", photo_url:"https://randomuser.me/api/portraits/women/7.jpg"},
        {id:8, name:"Rajesh Kumar", dob:"1988-06-05", address:"56 River Side", id_proof:"ID-ARS-001122", photo_url:"https://randomuser.me/api/portraits/men/8.jpg"},
        {id:9, name:"Lakshmi Nair", dob:"1993-12-27", address:"78 College Road", id_proof:"ID-ARS-334455", photo_url:"https://randomuser.me/api/portraits/women/9.jpg"},
        {id:10, name:"Amit Singh", dob:"1980-08-14", address:"91 Highway 7", id_proof:"ID-ARS-667788", photo_url:"https://randomuser.me/api/portraits/men/10.jpg"}
      ],
      criminalRecords: [
        {id:1, citizen_id:3, case_id:1, charges:"Arms Trafficking", status:"wanted"},
        {id:2, citizen_id:5, case_id:2, charges:"Cyber Terrorism", status:"under_surveillance"},
        {id:3, citizen_id:1, case_id:1, charges:"Cyber Fraud", status:"arrested"},
        {id:4, citizen_id:6, case_id:3, charges:"Drug Trafficking", status:"wanted"},
        {id:5, citizen_id:8, case_id:4, charges:"Financial Fraud", status:"cleared"}
      ],
      cases: [
        {id:1, title:"Operation Night Shadow", status:"active", assigned_officer:"Inspector Arjun Rao"},
        {id:2, title:"Ghost Protocol", status:"under_investigation", assigned_officer:"Cyber Unit K-9"},
        {id:3, title:"Shadow Network", status:"active", assigned_officer:"Officer Neha Singh"},
        {id:4, title:"Highway Heist", status:"active", assigned_officer:"Inspector Arjun Rao"}
      ]
    };

    class APIS {
      constructor() {
        this.data = DEMO_DATA;
        this.currentUser = null;
        this.init();
      }
      
      init() {
        this.showLogin();
        console.log('🛡️ APIS Initialized');
      }
      
      login(email, password) {
        const user = this.data.users.find(u => u.email === email && u.password === password);
        if (user) {
          this.currentUser = user;
          this.showDashboard();
          return true;
        }
        alert('❌ Access Denied');
        return false;
      }
      
      logout() {
        this.currentUser = null;
        this.showLogin();
      }
      
      showLogin() {
        document.getElementById('app').innerHTML = `
          <div class="min-h-screen flex items-center justify-center p-8">
            <div class="text-center glass-panel p-12 rounded-3xl w-full max-w-md glow-cyan">
              <div class="neon-text text-5xl mb-8 font-bold">🛡️ APIS</div>
              <div class="text-2xl mb-12 text-cyan-400">ARZAMA POLICE INTELLIGENCE SYSTEM</div>
              <h2 class="neon-text text-3xl mb-8 font-bold">SECURE LOGIN</h2>
              <form id="loginForm" class="space-y-6">
                <input type="email" id="loginEmail" placeholder="Email (arjun@arzama.police)" class="w-full glass-panel p-4 rounded-xl border border-cyan-500/50 focus:glow-cyan text-lg" required>
                <input type="password" id="loginPassword" placeholder="Password (admin123)" class="w-full glass-panel p-4 rounded-xl border border-cyan-500/50 focus:glow-cyan text-lg" required>
                <button type="submit" class="btn-primary w-full text-lg py-4">AUTHENTICATE ACCESS</button>
              </form>
              <div class="text-sm text-gray-400 mt-6 p-4 bg-black/30 rounded-xl">
                👮‍♂️ arjun@arzama.police / admin123<br>
                👮 neha@arzama.police / officer123
              </div>
            </div>
          </div>
        `;
        
        document.getElementById('loginForm').onsubmit = (e) => {
          e.preventDefault();
          const email = document.getElementById('loginEmail').value;
          const password = document.getElementById('loginPassword').value;
          this.login(email, password);
        };
      }
      
      showDashboard() {
        const stats = {
          citizens: this.data.citizens.length,
          wanted: this.data.criminalRecords.filter(r => r.status === 'wanted').length,
          arrested: this.data.criminalRecords.filter(r => r.status === 'arrested').length,
          cases: this.data.cases.filter(c => c.status === 'active').length
        };
        
        document.getElementById('app').innerHTML = `
          <div class="min-h-screen p-6">
            <header class="glass-panel glow-cyan p-6 rounded-2xl mb-8 flex justify-between items-center">
              <div>
                <h1 class="neon-text text-4xl font-bold mb-2">🛡️ ARZAMA POLICE INTELLIGENCE</h1>
                <p class="text-cyan-300 text-lg">Securing Intelligence. Enforcing Justice.</p>
              </div>
              <div class="flex items-center space-x-4">
                <span class="text-xl font-bold">👮‍♂️ ${this.currentUser.name}</span>
                <button onclick="apis.logout()" class="btn-danger px-6 py-2">LOGOUT</button>
              </div>
            </header>
            
            <div class="dashboard-grid mb-12">
              <div class="glass-panel p-8 rounded-2xl glow-violet text-center">
                <h3 class="text-2xl font-bold mb-4 text-violet-300">TOTAL CITIZENS</h3>
                <div class="text-5xl font-bold text-violet-400">${stats.citizens}</div>
              </div>
              <div class="glass-panel p-8 rounded-2xl glow-red text-center">
                <h3 class="text-2xl font-bold mb-4 text-red-300">WANTED</h3>
                <div class="text-5xl font-bold text-red-400">${stats.wanted}</div>
              </div>
              <div class="glass-panel p-8 rounded-2xl text-center">
                <h3 class="text-2xl font-bold mb-4 text-green-300">ARRESTED</h3>
                <div class="text-5xl font-bold text-green-400">${stats.arrested}</div>
              </div>
              <div class="glass-panel p-8 rounded-2xl text-center">
                <h3 class="text-2xl font-bold mb-4 text-yellow-300">ACTIVE CASES</h3>
                <div class="text-5xl font-bold text-yellow-400">${stats.cases}</div>
              </div>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
              <div class="glass-panel p-8 rounded-2xl">
                <h2 class="neon-text text-3xl font-bold mb-6">👥 CITIZEN DATABASE</h2>
                <div class="space-y-4 max-h-96 overflow-auto">
                  ${this.data.citizens.map(c => `
                    <div class="flex items-center p-4 glass-panel rounded-xl hover:bg-white/10">
                      <img src="${c.photo_url}" class="w-16 h-16 rounded-full border-4 border-cyan-500 glow-cyan mr-4" alt="${c.name}" onerror="this.src='https://via.placeholder.com/64/00f5ff/ffffff?text=${c.name[0]}'">
                      <div class="flex-1 min-w-0">
                        <div class="font-bold text-lg">${c.name}</div>
                        <div class="text-sm text-gray-400">${c.id_proof}</div>
                        <div class="text-xs">${c.dob} • ${c.address}</div>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>
              
              <div class="glass-panel p-8 rounded-2xl">
                <h2 class="neon-text text-3xl font-bold mb-6">🚨 CRIMINAL RECORDS</h2>
                <div class="space-y-3">
                  ${this.data.criminalRecords.map(r => {
                    const citizen = this.data.citizens.find(c => c.id === r.citizen_id);
                    const caseName = this.data.cases.find(c => c.id === r.case_id)?.title || 'N/A';
                    return `
                      <div class="flex items-start p-4 glass-panel rounded-xl hover:bg-white/10">
                        <img src="${citizen?.photo_url}" class="w-12 h-12 rounded-full border-2 border-red-500 glow-red mr-3 mt-1" alt="${citizen?.name}">
                        <div class="flex-1">
                          <div class="font-bold">${citizen?.name || 'Unknown'}</div>
                          <div class="text-sm text-gray-400">${r.charges}</div>
                          <div class="text-xs mt-1">${caseName}</div>
                        </div>
                        <span class="status-${r.status} ml-4 px-4 py-2 font-bold whitespace-nowrap">${r.status?.toUpperCase()}</span>
                      </div>
                    `;
                  }).join('')}
                </div>
              </div>
            </div>
            
            <div class="glass-panel p-6 rounded-2xl">
              <h2 class="neon-text text-3xl font-bold mb-6">📊 RECENT ACTIVITY</h2>
              <div class="text-sm text-gray-300">
                • Inspector Arjun Rao logged in<br>
                • Database initialized with 10 citizens<br>
                • 5 criminal records loaded<br>
                • 4 active cases active<br>
                • System security: ✅ VERIFIED
              </div>
            </div>
          </div>
        `;
        console.log('✅ Dashboard loaded:', stats);
      }
    }
    
    // Global instance
    const apis = new APIS();
    
    console.log('🚀 ARZAMA POLICE SYSTEM - READY');
  </script>
</body>
</html>
